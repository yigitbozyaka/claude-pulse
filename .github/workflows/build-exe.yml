name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach the exe to (e.g. v1.1.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: pyinstaller ClaudeUsageMonitor.spec

      - name: Upload EXE to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist/ClaudeUsageMonitor.exe
